version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: detto
      POSTGRES_USER: detto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-detto_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detto"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://detto:${DB_PASSWORD:-detto_secret}@db:5432/detto
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
